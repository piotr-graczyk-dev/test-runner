name: Maestro Tests

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "ai-tester run ID"
        required: true
      artifact_url:
        description: "EAS artifact URL (.app tarball or .apk)"
        required: true
      flows_json:
        description: "Base64-encoded JSON array of {id, yaml}"
        required: true
      callback_url:
        description: "URL to POST results to"
        required: true

jobs:
  maestro:
    runs-on: macos-latest
    steps:
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Prepare flows and download artifact
        env:
          FLOWS_JSON: ${{ inputs.flows_json }}
          ARTIFACT_URL: ${{ inputs.artifact_url }}
        run: |
          mkdir -p flows
          echo "$FLOWS_JSON" | base64 -d > /tmp/flows.json
          node -e "
            const flows = JSON.parse(require('fs').readFileSync('/tmp/flows.json', 'utf8'));
            flows.forEach(f => {
              require('fs').writeFileSync('flows/flow_' + f.id + '.yaml', f.yaml);
              console.log('Wrote flow', f.id);
            });
          "
          wget -q -O artifact "$ARTIFACT_URL"
          # Detect format and extract
          if file artifact | grep -q "gzip\|tar"; then
            tar -xzf artifact
            # Find .app bundle or .apk
            APP=$(find . -name "*.app" -maxdepth 3 -type d | head -1)
            APK=$(find . -name "*.apk" -maxdepth 3 | head -1)
            if [ -n "$APP" ]; then
              echo "Found iOS .app: $APP"
              echo "PLATFORM=ios" >> $GITHUB_ENV
              echo "APP_PATH=$APP" >> $GITHUB_ENV
            elif [ -n "$APK" ]; then
              echo "Found Android .apk: $APK"
              echo "PLATFORM=android" >> $GITHUB_ENV
              echo "APP_PATH=$APK" >> $GITHUB_ENV
            else
              echo "No .app or .apk found in archive" && exit 1
            fi
          else
            echo "PLATFORM=android" >> $GITHUB_ENV
            mv artifact app.apk
            echo "APP_PATH=app.apk" >> $GITHUB_ENV
          fi

      - name: Boot iOS Simulator
        if: env.PLATFORM == 'ios'
        run: |
          set -euo pipefail

          echo "=== Available simulators ==="
          xcrun simctl list devices available 2>&1 | grep -E "iPhone|iPad" | head -20

          # Create a fresh simulator to avoid stale state
          UDID=$(xcrun simctl create "ai-tester-device" "iPhone 15" "iOS17.5" 2>&1 || \
                 xcrun simctl create "ai-tester-device" "iPhone 14" 2>&1 || \
                 xcrun simctl list devices available | grep "iPhone" | grep -v "unavailable" | head -1 | grep -o '[A-F0-9-]\{36\}')
          echo "Using simulator UDID: $UDID"

          xcrun simctl boot "$UDID" 2>&1 || true
          echo "Waiting for simulator to be ready..."
          xcrun simctl bootstatus "$UDID" -b 2>&1

          echo "=== Installing app: $APP_PATH ==="
          xcrun simctl install "$UDID" "$APP_PATH" 2>&1
          echo "App installed successfully"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Run Maestro tests
        run: |
          $HOME/.maestro/bin/maestro --device "$SIMULATOR_UDID" test flows/ --format JUNIT --output /tmp/results.xml 2>&1 || true

      - name: POST results to ai-tester
        if: always()
        env:
          RUN_ID: ${{ inputs.run_id }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.TEST_RESULTS_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const flows = JSON.parse(fs.readFileSync('/tmp/flows.json', 'utf8'));

            let xml = '';
            try { xml = fs.readFileSync('/tmp/results.xml', 'utf8'); } catch {}

            const results = flows.map(flow => {
              const name = 'flow_' + flow.id;
              const tcMatch = xml.match(new RegExp('<testcase[^>]+name=\"' + name + '\"[^>]*>([\\s\\S]*?)<\\/testcase>|<testcase[^>]+name=\"' + name + '\"[^>]*\\/>'));
              if (!tcMatch) {
                return { flowId: parseInt(flow.id), status: 'failed', durationMs: null, failedStep: 'Flow did not run' };
              }
              const tcTag = tcMatch[0];
              const timeMatch = tcTag.match(/time=\"([^\"]+)\"/);
              const failureMatch = tcTag.match(/<failure[^>]*message=\"([^\"]*)\"/);
              const hasFailed = /<failure/.test(tcTag);
              return {
                flowId: parseInt(flow.id),
                status: hasFailed ? 'failed' : 'passed',
                durationMs: timeMatch ? Math.round(parseFloat(timeMatch[1]) * 1000) : null,
                failedStep: failureMatch ? failureMatch[1] : null,
              };
            });

            console.log('Results:', JSON.stringify(results, null, 2));

            const body = JSON.stringify({ runId: parseInt(process.env.RUN_ID), flows: results });
            fetch(process.env.CALLBACK_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.CALLBACK_SECRET,
              },
              body,
            }).then(r => {
              console.log('Callback status:', r.status);
              if (!r.ok) return r.text().then(t => { throw new Error(t); });
            }).catch(e => {
              console.error('Callback failed:', e.message);
              process.exit(1);
            });
          "
